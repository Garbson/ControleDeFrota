version: '3.9'

# ============================================================
# ControleDeFrota — Docker Compose
# Cada serviço fica isolado na rede controlefrota-net
# ============================================================

services:

  # ── MySQL dedicado
  controlefrota-mysql:
    image: mysql:8.0
    container_name: controlefrota-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: controlefrota
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - controlefrota-mysql-data:/var/lib/mysql
    networks:
      - controlefrota-net
    ports:
      - "3310:3306"   # só para acesso local/debug — remover em produção
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Node.js
  controlefrota-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: controlefrota-api
    restart: unless-stopped
    volumes:
      - controlefrota-uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: controlefrota-mysql
      DB_PORT: 3306
      DB_NAME: controlefrota
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: https://controlefrota.zlabs.com.br
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_FILES_BUCKET: ${R2_FILES_BUCKET:-controlefrota-files}
    depends_on:
      controlefrota-mysql:
        condition: service_healthy
    networks:
      - controlefrota-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Backup diário para bucket privado Cloudflare R2
  controlefrota-backup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: controlefrota-backup
    restart: unless-stopped
    command: ["/app/scripts/backup-loop.sh"]
    volumes:
      - controlefrota-uploads:/app/uploads:ro
    environment:
      NODE_ENV: production
      DB_HOST: controlefrota-mysql
      DB_PORT: 3306
      DB_NAME: controlefrota
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_FILES_BUCKET: ${R2_FILES_BUCKET:-controlefrota-files}
      R2_BACKUP_BUCKET: ${R2_BACKUP_BUCKET:-controlefrota-backups}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-35}
      UPLOADS_PATH: /app/uploads
      TZ: America/Sao_Paulo
    depends_on:
      controlefrota-mysql:
        condition: service_healthy
    networks:
      - controlefrota-net

  # ── Frontend Vue (nginx)
  controlefrota-web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: controlefrota-web
    restart: unless-stopped
    networks:
      - controlefrota-net
    depends_on:
      - controlefrota-api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  controlefrota-mysql-data:
    name: controlefrota-mysql-data
  controlefrota-uploads:
    name: controlefrota-uploads

networks:
  # Rede interna — todos os containers se comunicam
  controlefrota-net:
    name: controlefrota-net
    driver: bridge
