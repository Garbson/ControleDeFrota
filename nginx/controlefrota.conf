# ================================================================
# ControleDeFrota — Nginx Proxy Config
# Domain: controlefrota.zlabs.com.br
# Network: controlefrota-net
# ================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Frontend SPA + API proxy ─────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    http2 on;

    server_name controlefrota.zlabs.com.br;

    client_max_body_size 12M;

    # ── API (backend Node.js) ──
    location /api/ {
        proxy_pass http://controlefrota-api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check API ──
    location /health {
        proxy_pass http://controlefrota-api:4000/health;
        proxy_set_header Host $host;
    }

    # ── Frontend Vue SPA ──
    location / {
        proxy_pass http://controlefrota-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
